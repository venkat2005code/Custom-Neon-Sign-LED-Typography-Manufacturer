<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Glow Custom Neon</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a24'/><path d='M 50 15 L 30 45 L 30 75 Q 50 85 70 75 L 70 45 Z' fill='none' stroke='%23ff00ff' stroke-width='6' stroke-linejoin='round'/><path d='M 50 50 L 50 15' fill='none' stroke='%23ff00ff' stroke-width='6' stroke-linecap='round'/><circle cx='50' cy='55' r='5' fill='none' stroke='%23ff00ff' stroke-width='6'/></svg>">
  <link rel="stylesheet" href="style.css">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@300;400;500;600;700&family=Pacifico&family=Vampiro+One&family=Yellowtail&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">

  <!-- Floating Toggles -->
  <div style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 15px;">
    <button id="rtl-toggle" class="toggle-btn" aria-label="Toggle RTL/LTR">LTR</button>
    <button id="theme-toggle" class="toggle-btn" aria-label="Toggle Theme">
      <i class="fa-solid fa-moon"></i>
    </button>
  </div>

  <!-- Signup Section -->
  <section class="hero" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 50px; background: url('https://images.unsplash.com/photo-1768141730849-631c658e43f7?w=2000&auto=format&fit=crop') center/cover;">
    <div class="aesthetic-backdrop"></div>
    <div class="container" style="max-width: 500px; width: 100%; margin: 0 auto; position: relative; z-index: 10;">
      <div style="background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); padding: clamp(20px, 5vw, 50px); border-radius: 20px; border: 1px solid var(--glass-border); text-align: center; box-shadow: var(--glass-shadow);">
        
        <div style="display: flex; justify-content: center; margin-bottom: 20px;">
          <a href="index.html" class="logo" style="font-size: 2.2rem;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40" class="logo-icon" style="vertical-align: middle;">
              <rect width="100" height="100" rx="20" fill="#1a1a24"/>
              <path d="M 50 15 L 30 45 L 30 75 Q 50 85 70 75 L 70 45 Z" fill="none" stroke="#ff00ff" stroke-width="6" stroke-linejoin="round"/>
              <path d="M 50 50 L 50 15" fill="none" stroke="#ff00ff" stroke-width="6" stroke-linecap="round"/>
              <circle cx="50" cy="55" r="5" fill="none" stroke="#ff00ff" stroke-width="6"/>
            </svg>
            Glow
          </a>
        </div>
        
        <h2 style="margin-bottom: 10px; font-size: 1.8rem;">Join Glow</h2>
        <p style="margin-bottom: 30px; color: var(--text-secondary);">Create your account to design custom neon signs.</p>

        <form style="text-align: start; display: flex; flex-direction: column; gap: 20px;">
          <input type="text" placeholder="Full Name" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);">
          <input type="email" placeholder="Email Address" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);">
          <input type="password" placeholder="Password" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);">
          <input type="password" placeholder="Confirm Password" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary);">
          <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">Create Account</button>
          
          <p style="text-align: center; font-size: 0.9rem; margin-top: 10px;">
            Already have an account? <a href="login.html" style="color: var(--accent-pink); text-decoration: none; font-weight: 600;">Sign in</a>
          </p>
        </form>
      </div>
    </div>
  </section>

  <script>
    // Theme Toggle
    const themeToggle = document.getElementById('theme-toggle');
    const body = document.body;
    
    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        body.classList.toggle('light-theme');
        body.classList.toggle('dark-theme');
        const icon = themeToggle.querySelector('i');
        if (body.classList.contains('light-theme')) {
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
        } else {
          icon.classList.remove('fa-sun');
          icon.classList.add('fa-moon');
        }
      });
    }

    // RTL Toggle
    const rtlToggle = document.getElementById('rtl-toggle');
    const html = document.documentElement;
    
    if (rtlToggle) {
      rtlToggle.addEventListener('click', () => {
        if (html.getAttribute('dir') === 'ltr') {
          html.setAttribute('dir', 'rtl');
          rtlToggle.textContent = 'RTL';
        } else {
          html.setAttribute('dir', 'ltr');
          rtlToggle.textContent = 'LTR';
        }
      });
    }
  </script>
</body>
</html>
